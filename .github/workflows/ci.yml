name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-engine
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend-engine/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Compile Hardhat Contracts
        run: npx hardhat compile

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Compile Backend
        run: npm run build

      - name: Run Unit Tests
        run: npm run test

  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-portal
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-portal/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Compile Frontend
        run: npm run build
